name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Carpeta fija en el disco del runner (persiste entre runs, fuera del workspace
  # que actions/checkout limpia en cada job).
  HISTORY_DIR: /home/ubuntu/pages-history
  MAX_RUNS: 5

jobs:
  e2e:
    runs-on: self-hosted
    steps:
      - name: Show runner capacity
        run: |
          echo "## Cores"
          nproc
          echo "## RAM"
          free -h
          echo "## Disco"
          df -h /

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Run Playwright tests
        id: test
        run: npx playwright test
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Archive run into history and build dashboard
        if: always()
        run: |
          set -e
          RUN_DIR="$HISTORY_DIR/runs/${{ github.run_number }}-$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$RUN_DIR"
          cp -r playwright-report/* "$RUN_DIR/"
          echo "${{ steps.test.outcome }}" > "$RUN_DIR/.status"

          # Rotación: conserva solo los MAX_RUNS más recientes, borra el resto
          cd "$HISTORY_DIR/runs"
          ls -1dt */ | tail -n +$((MAX_RUNS + 1)) | xargs -r rm -rf

          # Regenera el index.html del dashboard con el histórico restante
          {
            echo "<!doctype html><html><head><meta charset='utf-8'>"
            echo "<title>saucedemo-playwright — Test Runs</title>"
            echo "<style>"
            echo "body{font-family:system-ui,-apple-system,sans-serif;max-width:720px;margin:48px auto;padding:0 16px;color:#1f2328;background:#fff}"
            echo "h1{font-size:1.4rem;margin-bottom:24px}"
            echo "ul{list-style:none;padding:0}"
            echo "li{margin:0 0 12px}"
            echo "a{display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:#1f2328;border:1px solid #d1d9e0;border-radius:8px;padding:14px 18px;transition:background .15s}"
            echo "a:hover{background:#f6f8fa}"
            echo ".badge{font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:999px}"
            echo ".ok{background:#dafbe1;color:#1a7f37}.fail{background:#ffebe9;color:#cf222e}"
            echo "</style>"
            echo "</head><body><h1>saucedemo-playwright — últimas corridas</h1><ul>"
            for dir in $(ls -1dt */); do
              name="${dir%/}"
              if [ "$(cat "$name/.status" 2>/dev/null)" = "failure" ]; then
                badge="<span class=\"badge fail\">failed</span>"
              else
                badge="<span class=\"badge ok\">passed</span>"
              fi
              run_number="${name%%-*}"
              ts="${name#*-}"
              date_fmt="${ts:0:4}-${ts:4:2}-${ts:6:2} ${ts:9:2}:${ts:11:2}:${ts:13:2}"
              echo "<li><a href=\"runs/$name/index.html\"><span>Run #$run_number — $date_fmt</span>$badge</a></li>"
            done
            echo "</ul></body></html>"
          } > "$HISTORY_DIR/index.html"

      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: /home/ubuntu/pages-history

      - name: Fail job if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  deploy-pages:
    needs: e2e
    if: always()
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
